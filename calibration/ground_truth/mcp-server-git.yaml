target_name: mcp-server-git
source: https://github.com/modelcontextprotocol/servers/tree/main/src/git
language: python
mcp_spec_version: '2025-06-18'
notes: Reference git server. Tool list and descriptions verified by direct capture from the installed
  mcp-server-git package (see ../reports/captured-mcp-server-git.json). 12 tools split between read-only
  inspection and write ops on the working tree.
tools:
- name: git_status
  description: Shows the working tree status
  input_schema:
    properties:
      repo_path:
        title: Repo Path
        type: string
    required:
    - repo_path
    title: GitStatus
    type: object
  capabilities:
  - fs_read
  parameter_roles:
    repo_path: path
  known_vulns: []
- name: git_diff_unstaged
  description: Shows changes in the working directory that are not yet staged
  input_schema:
    properties:
      repo_path:
        title: Repo Path
        type: string
      context_lines:
        default: 3
        title: Context Lines
        type: integer
    required:
    - repo_path
    title: GitDiffUnstaged
    type: object
  capabilities:
  - fs_read
  parameter_roles:
    repo_path: path
  known_vulns: []
- name: git_diff_staged
  description: Shows changes that are staged for commit
  input_schema:
    properties:
      repo_path:
        title: Repo Path
        type: string
      context_lines:
        default: 3
        title: Context Lines
        type: integer
    required:
    - repo_path
    title: GitDiffStaged
    type: object
  capabilities:
  - fs_read
  parameter_roles:
    repo_path: path
  known_vulns: []
- name: git_diff
  description: Shows differences between branches or commits
  input_schema:
    properties:
      repo_path:
        title: Repo Path
        type: string
      target:
        title: Target
        type: string
      context_lines:
        default: 3
        title: Context Lines
        type: integer
    required:
    - repo_path
    - target
    title: GitDiff
    type: object
  capabilities:
  - fs_read
  parameter_roles:
    repo_path: path
  known_vulns: []
- name: git_commit
  description: Records changes to the repository
  input_schema:
    properties:
      repo_path:
        title: Repo Path
        type: string
      message:
        title: Message
        type: string
    required:
    - repo_path
    - message
    title: GitCommit
    type: object
  capabilities:
  - fs_write
  parameter_roles:
    repo_path: path
  known_vulns: []
- name: git_add
  description: Adds file contents to the staging area
  input_schema:
    properties:
      repo_path:
        title: Repo Path
        type: string
      files:
        items:
          type: string
        title: Files
        type: array
    required:
    - repo_path
    - files
    title: GitAdd
    type: object
  capabilities:
  - fs_write
  parameter_roles:
    repo_path: path
  known_vulns: []
- name: git_reset
  description: Unstages all staged changes
  input_schema:
    properties:
      repo_path:
        title: Repo Path
        type: string
    required:
    - repo_path
    title: GitReset
    type: object
  capabilities:
  - fs_write
  parameter_roles:
    repo_path: path
  known_vulns: []
- name: git_log
  description: Shows the commit logs
  input_schema:
    properties:
      repo_path:
        title: Repo Path
        type: string
      max_count:
        default: 10
        title: Max Count
        type: integer
      start_timestamp:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: 'Start timestamp for filtering commits. Accepts: ISO 8601 format (e.g., ''2024-01-15T14:30:25''),
          relative dates (e.g., ''2 weeks ago'', ''yesterday''), or absolute dates (e.g., ''2024-01-15'',
          ''Jan 15 2024'')'
        title: Start Timestamp
      end_timestamp:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: 'End timestamp for filtering commits. Accepts: ISO 8601 format (e.g., ''2024-01-15T14:30:25''),
          relative dates (e.g., ''2 weeks ago'', ''yesterday''), or absolute dates (e.g., ''2024-01-15'',
          ''Jan 15 2024'')'
        title: End Timestamp
    required:
    - repo_path
    title: GitLog
    type: object
  capabilities:
  - fs_read
  parameter_roles:
    repo_path: path
  known_vulns: []
- name: git_create_branch
  description: Creates a new branch from an optional base branch
  input_schema:
    properties:
      repo_path:
        title: Repo Path
        type: string
      branch_name:
        title: Branch Name
        type: string
      base_branch:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        title: Base Branch
    required:
    - repo_path
    - branch_name
    title: GitCreateBranch
    type: object
  capabilities:
  - fs_write
  parameter_roles:
    repo_path: path
  known_vulns: []
- name: git_checkout
  description: Switches branches
  input_schema:
    properties:
      repo_path:
        title: Repo Path
        type: string
      branch_name:
        title: Branch Name
        type: string
    required:
    - repo_path
    - branch_name
    title: GitCheckout
    type: object
  capabilities:
  - fs_write
  parameter_roles:
    repo_path: path
  known_vulns: []
- name: git_show
  description: Shows the contents of a commit
  input_schema:
    properties:
      repo_path:
        title: Repo Path
        type: string
      revision:
        title: Revision
        type: string
    required:
    - repo_path
    - revision
    title: GitShow
    type: object
  capabilities:
  - fs_read
  parameter_roles:
    repo_path: path
  known_vulns: []
- name: git_branch
  description: List Git branches
  input_schema:
    properties:
      repo_path:
        description: The path to the Git repository.
        title: Repo Path
        type: string
      branch_type:
        description: Whether to list local branches ('local'), remote branches ('remote') or all branches('all').
        title: Branch Type
        type: string
      contains:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: The commit sha that branch should contain. Do not pass anything to this param if
          no commit sha is specified
        title: Contains
      not_contains:
        anyOf:
        - type: string
        - type: 'null'
        default: null
        description: The commit sha that branch should NOT contain. Do not pass anything to this param
          if no commit sha is specified
        title: Not Contains
    required:
    - repo_path
    - branch_type
    title: GitBranch
    type: object
  capabilities:
  - fs_read
  parameter_roles:
    repo_path: path
  known_vulns: []
