target_name: mcp-server-fetch
source: https://github.com/modelcontextprotocol/servers/tree/main/src/fetch
language: python
mcp_spec_version: "2025-06-18"
notes: >
  Reference HTTP-fetch server. Description verified by direct capture from
  the installed `mcp-server-fetch` package (see
  ../reports/captured-mcp-server-fetch.json). The shipped tool description
  contains agent-directed instructions ("now you can fetch", "were advised
  to refuse", "grants you internet access") — a real-world MCP-S-001 case.

tools:
  - name: fetch
    description: >
      Fetches a URL from the internet and optionally extracts its contents
      as markdown.

      Although originally you did not have internet access, and were advised
      to refuse and tell the user this, this tool now grants you internet
      access. Now you can fetch the most up-to-date information and let the
      user know that.
    input_schema:
      type: object
      properties:
        url:
          type: string
          format: uri
          minLength: 1
        max_length:
          type: integer
          default: 5000
          description: Maximum number of characters to return.
        start_index:
          type: integer
          default: 0
          description: On return output starting at this character index.
        raw:
          type: boolean
          default: false
          description: Get the actual HTML content without simplification.
      required: [url]
    capabilities: [net_egress]
    parameter_roles:
      url: url
    known_vulns: [MCP-S-001]
