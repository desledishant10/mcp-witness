worker_processes 1;
events { worker_connections 64; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    server {
        listen 3000;
        server_name _;

        # Disable nginx-side caching so the page itself doesn't get cached.
        # We do NOT want to disable browser DNS caching — the test relies on
        # the browser caching the initial DNS resolution and then re-resolving
        # after the TTL.
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
    }
}
